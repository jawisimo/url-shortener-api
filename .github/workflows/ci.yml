name: Tests & Build

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw clean verify -Dspring.profiles.active=test --batch-mode --update-snapshots

      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      - name: Upload JaCoCo HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html
          path: '**/target/site/jacoco'
          if-no-files-found: error

      - name: Run build
        run: ./mvnw package -Pprod --batch-mode --update-snapshots